<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Solución de Tickets</title>
  <link rel="stylesheet" href="../assets/Css/style.css">
</head>
<body>

<header class="encabezado">
  <h1>Registro de las Soluciones</h1>
  <p>Aquí se podrán asociar las soluciones técnicas al ticket.</p>
</header>

<section class="modulo" id="AsociarSolucionTicket">
  <h2>Asociar solución a ticket</h2>

  <form class="formulario" id="formAsociarSolucionTicket">

    <label for="Ticket">Ticket</label>
    <select id="Ticket" required>
      <option value="">-- Seleccioná un ticket --</option>
      <option value="INC-2026-0001">INC-2026-0001</option>
      <option value="INC-2026-0002">INC-2026-0002</option>
      <option value="INC-2026-0003">INC-2026-0003</option>
      <option value="INC-2026-0004">INC-2026-0004</option>
      <option value="INC-2026-0005">INC-2026-0005</option>
      <option value="INC-2026-0006">INC-2026-0006</option>
      <option value="INC-2026-0007">INC-2026-0007</option>
      <option value="INC-2026-0008">INC-2026-0008</option>
      <option value="INC-2026-0009">INC-2026-0009</option>
    </select>

    <label for="AsociarSolucionTicketSolucion">Solución asociada</label>
    <textarea id="AsociarSolucionTicketSolucion" rows="4" minlength="10" required></textarea>

    <button class="boton-principal" type="submit">Asociar solución</button>

  </form>
</section>

<script src="../Assets/Js/SolucionTicket.js"></script>

</body>
</html>
