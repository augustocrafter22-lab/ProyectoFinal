<!DOCTYPE html>
<html lang="es">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Vista-Laboratorio</title>
    <link rel="stylesheet" href="../Assets/Css/barraNavegación.css">
    <link rel="stylesheet" href="../Assets/Css/style.css">
</head>

<body>
    <header class="BarraNavegacion">

        <nav>
            <button class="btnMenu" id="btnMenu" type="button"><img class="menu"
                    src="../Assets/Imagenes/Bootstrap/list.svg" alt="menu" width="40" height="40px"></button>

            <button class="btnMenuC" id="btnMenuC" type="button">
                <img src="../Assets/Imagenes/Bootstrap/x.svg" alt="X" class="menu" width="40" height="40px">
            </button>

           <ul class="listaNavegacion">
                <li><a href="Tecnico.html">Regresar</a></li>
                <li><a href="Login.html">Cerrar sesion</a></li>
            </ul>
        </nav>
        <h1>S.G.R.S.I</h1>
        <img src="../Assets/Imagenes/Isotipo-UTU-Color-Dorado-PNG.png" alt="Logo-Utu" width="75px">
    </header>

    <section class="encabezado">
        <h1>Vista de Laboratorio</h1>
        <p>¡Hola! Esta seccion es para visualizar la solicitudes de preparacion de laboratorios</p>
    </section>
    <section class="modulo" id="VisualizacionLaboratorio">
        <fieldset class="controles">
            <legend>Filtros</legend>

            <label for="filtroPorFecha">Fecha:</label>
            <input type="date" id="filtroPorFecha">

            <label for="filtroPorLaboratorio">Laboratorio:</label>
            <select id="filtroPorLaboratorio">
                <option value="">Todos</option>
                <option value="Laboratorio 1">Laboratorio 1</option>
                <option value="Laboratorio 2">Laboratorio 2</option>
                <option value="Laboratorio 3">Laboratorio 3</option>
                <option value="Laboratorio 4">Laboratorio 4</option>
                <option value="Laboratorio 5">Laboratorio 5</option>
                <option value="Laboratorio 6">Laboratorio 6</option>
            </select>

            <button id="btnLimpiarFiltro" type="button">Limpiar filtros</button>
        </fieldset>


        <table id="tablaLaboratorio">
            <thead>
                <tr>
                    <th>ID</th>
                    <th>Laboratorio</th>
                    <th>Software</th>
                    <th>Detalle</th>
                    <th>Restricciones</th>
                    <th>Fecha</th>
                    <th>Hora</th>
                </tr>
            </thead>
            <tbody id="cuerpoTabla">
            </tbody>
        </table>
    </section>
    <script src="../Assets/JS/barraNavegacion.js"></script>
    <script src="../Assets/JS/vistaLab.js"></script>
    <script src="../Assets/JS/Verificador.js"></script>
</body>

</html>
