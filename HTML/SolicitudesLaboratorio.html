<!DOCTYPE html>
<html lang="es">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Solicitudes-Laboratorio</title>
    <link rel="stylesheet" href="../Assets/Css/barraNavegación.css">
    <link rel="stylesheet" href="../Assets/Css/style.css">
</head>

<body>
    <header class="BarraNavegacion">

        <nav>
            <button class="btnMenu" id="btnMenu" type="button"><img class="menu"
                    src="../Assets/Imagenes/Bootstrap/list.svg" alt="menu" width="40" height="40px"></button>

            <button class="btnMenuC" id="btnMenuC" type="button">
                <img src="../Assets/Imagenes/Bootstrap/x.svg" alt="X" class="menu" width="40" height="40px">
            </button>

            <ul class="listaNavegacion">
                <li><a href=""></a></li>
                <li><a href=""></a></li>
                <li><a href=""></a></li>
                <li><a href=""></a></li>
            </ul>
        </nav>
        <h1>S.G.R.S.I</h1>
        <img src="../Assets/Imagenes/Isotipo-UTU-Color-Dorado-PNG.png" alt="Logo-Utu" width="75px">
    </header>

    <section class="encabezado">
        <h1>Solicitud de Laboratorio</h1>
        <p>¡Hola! Esta seccion es para solicitar la preparación de un laboratorio</p>
    </section>

    <section class="modulo" id="ingresoLaboratorio">
        <form class="formulario" id="LabForm">

            <label for="laboratorio">Laboratorios</label>
            <select name="Laboratorio" id="laboratorioSolicitud" required>
                <option value="">Seleccione un espacio</option>
                <option value="Laboratorio 1">Laboratorio 1</option>
                <option value="Laboratorio 2">Laboratorio 2</option>
                <option value="Laboratorio 3">Laboratorio 3</option>
                <option value="Laboratorio 4">Laboratorio 4</option>
                <option value="Laboratorio 5">Laboratorio 5</option>
                <option value="Laboratorio 6">Laboratorio 6</option>
            </select>
            <label for="SolicitarSoftware">Solicitud de software (En caso de ser necesaria, por favor aclarar el nombre y version del software solicitado en el Detalle)</label>
            <select name="SolicitudDeSoftware" id="SolicitudDeSoftware">
                <option value="No">No</option>
                <option value="Si">Si</option>
            </select>
            <label for="DetalleSoftware">Detalle</label>
                <textarea id="DetalleSoftware" rows="4" minlength="2" required></textarea>


            <button class="boton-principal" type="submit">Publicar Solicitud</button>
        </form>


</body>
<script src="../Assets/JS/barraNavegacion.js"></script>
<script src="../Assets/JS/Laboratorio.js"></script>

</html>
