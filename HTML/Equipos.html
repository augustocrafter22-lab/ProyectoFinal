<!doctype html>
<html lang="es">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Equipos</title>
    <link rel="stylesheet" href="../Assets/Css/global.css" />
    <link rel="stylesheet" href="../Assets/Css/equipos.css" />
    <link
      rel="stylesheet"
      href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.13.1/font/bootstrap-icons.css"
    />
    <link rel="stylesheet" href="../Assets/Css/Formulario.css" />
    <link rel="stylesheet" href="../Assets/Css/globalSistema.css" />
  </head>
  <body>
    <header class="barraNavegacion">
      <img
        src="../Assets/Imagenes/Deklan_EnterpriceIMG.png"
        alt="Logo de la empresa"
        class="logo"
        width="200"
        height="125"
      />
      <h1>Sistema de Gestión de Recursos y Soporte de Informática</h1>

      <nav>
        <button class="btnMenu" id="btnMenu" type="button">
          <img src="../Assets/Imagenes/list.svg" alt="Menú" class="iconoMenu" />
        </button>
        <button class="btnCerrarMenu" id="btnCerrarMenu" type="button">
          <img
            src="../Assets/Imagenes/x.svg"
            alt="Cerrar Menú"
            class="iconoMenu"
          />
        </button>
        <ul class="listaNavegacion">
          <li><a href="login.html" class="btnNavegacion">Cerrar sesión</a></li>
        </ul>
      </nav>
    </header>

    <main>
      <section class="tablaPcs">
        <header class="cajaEncabezado">
          <h2>Datos de Equipos</h2>
          <button type="button" class="btnOperacion" id="btnAltaPc">
            Alta PC
          </button>
        </header>

        <table>
          <caption>
            Listado de equipos registrados
          </caption>
          <thead>
            <tr>
              <th>ID</th>
              <th>Laboratorio</th>
              <th>Estado</th>
              <th>Marca</th>

            </tr>
          </thead>
          <tbody id="cuerpoTablaPc"></tbody>
        </table>
      </section>

      <dialog class="dialogGestionarPc seccionFormulario">
        <button
          class="btnCerrarGestionarPc"
          id="btnCerrarGestionarPc"
          type="button"
        >
          <img
            src="../Assets/Imagenes/x.svg"
            alt="Cerrar Menú"
            class="iconoMenu"
          />
        </button>
        <form action="Equipos.html" method="post" id="formularioGestionarPc">
          <fieldset>
            <legend>Gestión de PC</legend>

            <fieldset class="seccionDatos">
              <legend>Datos del dispositivo</legend>

              <select class="cajaEntradaDeDatos" id="ID">
                <option value="PC-01">01</option>
                <option value="PC-02">02</option>
                <option value="PC-03">03</option>
                <option value="PC-04">04</option>
                <option value="PC-05">05</option>
                <option value="PC-01">06</option>
                <option value="PC-07">07</option>
                <option value="PC-08">08</option>
                <option value="PC-09">09</option>
                <option value="PC-10">10</option>
                <option value="PC-11">11</option>
                <option value="PC-12">12</option>
                <option value="PC-13">13</option>
                <option value="PC-14">14</option>
                <option value="PC-15">15</option>
                <option value="PC-16">16</option>
              </select>

              <select class="cajaEntradaDeDatos" id="Lab">
                <option value="Laboratorio 1">Laboratorio 1</option>
                <option value="Laboratorio 2">Laboratorio 2</option>
                <option value="Laboratorio 3">Laboratorio 3</option>
                <option value="Laboratorio 4">Laboratorio 4</option>
                <option value="Laboratorio 5">Laboratorio 5</option>
                <option value="Laboratorio 6">Laboratorio 6</option>
              </select>

              <select class="cajaEntradaDeDatos" id="Estado">
                <option value="Operativo">Operativo</option>
                <option value="Degradado">Degradado</option>
                <option value="En mantenimiento">En mantenimiento</option>
                <option value="No operativo">No operativo</option>
                <option value="obsoleto">Obsoleto</option>
              </select>



              <select class="cajaEntradaDeDatos" id="Marca">
                <option value="Lenovo">Lenovo</option>
                <option value="HP">HP</option>
                <option value="Asus">Asus</option>
                <option value="Acer">Acer</option>
                <option value="Sony">Sony</option>
                <option value="Dell">Dell</option>
              </select>
            </fieldset>
            </fieldset>
            <button type="submit">Guardar Pc</button>
          </fieldset>
        </form>
      </dialog>
    </main>

    <script src="../Assets/JS/gestionPCs.js"></script>
    <script src="../Assets/JS/barraNavegacion.js"></script>
  </body>
</html>
