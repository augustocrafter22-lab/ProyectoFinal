<!DOCTYPE html>
<html lang="es">
<link rel="stylesheet" href="../Css/Dashboard.css">
<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css" rel="stylesheet"
    integrity="sha384-sRIl4kxILFvY47J16cr9ZwB07vP4J8+LH7qKQnuqkuIAvNWLzeN8tE5YBujZqJLB" crossorigin="anonymous">
<script src="https://cdnjs.cloudflare.com/ajax/libs/Chart.js/4.4.1/chart.umd.min.js"></script>

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title></title>
</head>

<body>

    <header class="BarraSuperior">
        <button class="btnMenu"><img class="menu" src="../Imagenes/Bootstrap/list.svg" alt="menu" width="40"
                height="40px"></button>
        <h1>SGRSI</h1>

    </header>

    <section class="Bienvenida">

        <img src="../Imagenes/Deklan_EnterpriceIMG.png" alt="Deklan_Enterprice" height="50px" width="70">
        <p>¡Bienvenido, Usuario!</p>
        <img src="../Imagenes/Isotipo-UTU-Color-Dorado-PNG.png" alt="Logo-Utu" height="70px" width="70">
    </section>
    <main>
        <section class="Estadistica">
            <article class="CartaEstadistica">
                <p class="Puntito1"><img src="../Imagenes/Bootstrap/circle-fill.svg" width="12" alt=""></p>
                <p class="CantidadEstadistica" id="cantReportes">-</p>
                <p class="EtiquetaEstadistica">Reportes</p>
            </article>
            <article class="CartaEstadistica">
                <p class="Puntito2"><img src="../Imagenes/Bootstrap/circle-fill.svg" width="12" alt=""></p>
                <p class="CantidadEstadistica" id="canIncidenciasAbiertas">-</p>
                <p class="EtiquetaEstadistica">Incidencias abiertas</p>
            </article>
            <article class="CartaEstadistica">
                <p class="Puntito3"><img src="../Imagenes/Bootstrap/circle-fill.svg" width="12" alt=""></p>
                <p class="CantidadEstadistica" id="cantEnProceso">-</p>
                <p class="EtiquetaEstadistica">En Proceso</p>
            </article>
            <article class="CartaEstadistica">
                <p class="Puntito4"><img src="../Imagenes/Bootstrap/circle-fill.svg" width="12" alt=""></p>
                <p class="CantidadEstadistica" id="cantResueltas"></p>
                <p class="EtiquetaEstadistica">Resueltas</p>
            </article>
        </section>

        <section class="PanelGrafico">
            <table class="tablaEstado">
                <h2>Incidencias por estado</h2>
                <thead>
                    <tr>
                        <th>Estado</th>
                        <th>Cantidad</th>
                    </tr>
                </thead>
                <tbody>
                    <tr>
                        <td><span class="etiqueta-estado">
                                <span class="puntoA">
                                </span>
                                Abiertas
                            </span></td>
                        <td class="contador" id="contador-Abiertas">—</td>
                    </tr>
                    <tr>
                        <td><span class="etiqueta-estado">
                                <span class="puntoB">
                                </span>
                                En Proceso
                            </span></td>
                        <td class="contador" id="contador-enProceso">—</td>
                    </tr>
                    <tr>
                        <td><span class="etiqueta-estado">
                                <span class="puntoC">
                                </span>
                                Resueltas
                            </span></td>
                        <td class="contador" id="contador-resueltas">—</td>
                    </tr>
                    <tr>
                        <td><span class="etiqueta-estado">
                                <span class="puntoD">
                                </span>
                                Cerradas
                            </span></td>
                        <td class="contador" id="contador-Cerradas">—</td>
                    </tr>
                <tfoot class="total-estado">
                    <tr>
                        <td>Total</td>
                        <td id="cuentaTotal">—</td>
                    </tr>
                </tfoot>
            </table>
        </section>
        <section class="PanelGrafico">
            <table class="tablaEstado">
                <h2>Tiempos de Resolución</h2>
                <thead>
                    <tr>
                        <th>Ticket</th>
                        <th>Días</th>
                    </tr>
                </thead>
                <tbody id="tbodyTiempos">
                </tbody>
            </table>
        </section>
        <section class="PanelGrafico">
            <h2>Incidencias por salón</h2>
            <table class="tablaEstado">
                <thead>
                    <tr>
                        <th>Salón</th>
                        <th>Incidencias</th>
                    </tr>
                </thead>
                <tbody id="tbodySalones">
                </tbody>
            </table>
        </section>

    </main>
    <script src="../JS/Dashboard.js"></script>
</body>

</html>
