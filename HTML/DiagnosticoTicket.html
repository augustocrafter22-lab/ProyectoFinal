<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Diagnostico de Tickets</title>
  <link rel="stylesheet" href="../assets/Css/style.css">
</head>

<body>
<h1>Registro de Diagnósticos</h1>
    <p>Aqui se registrara el diagnóstico asociado al ticket.</p>
<section class="modulo" id="DiagnosticoTicket">
  <h2>Asociar diagnóstico a ticket</h2>
  <form class="formulario" id="formDiagnosticoTicket">
    <label for="DiagnosticoTicketTicket">Ticket</label>
    <select id="DiagnosticoTicketTicket" required>
        <option value="INC-2026-0001">INC-2026-0001</option>
        <option value="INC-2026-0002">INC-2026-0002</option>
        <option value="INC-2026-0003">INC-2026-0003</option>
        <option value="INC-2026-0004">INC-2026-0004</option>
        <option value="INC-2026-0005">INC-2026-0005</option>
        <option value="INC-2026-0006">INC-2026-0006</option>
        <option value="INC-2026-0007">INC-2026-0007</option>
        <option value="INC-2026-0008">INC-2026-0008</option>
        <option value="INC-2026-0009">INC-2026-0009</option>
    </select>

    <label for="DiagnosticoTicketDiagnostico">Diagnóstico asociado</label>
    <textarea id="DiagnosticoTicketDiagnostico" rows="4" minlength="10" required></textarea>

    <button class="boton-principal" type="submit">Asociar diagnóstico</button>
  </form>
</section>
    <script src="../Assets/Js/DiagnosticoTicket.js"></script>
    </body>
</html>
