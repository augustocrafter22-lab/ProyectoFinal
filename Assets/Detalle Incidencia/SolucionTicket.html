<section></section>
<section class="modulo" id="AsociarSolucionTicket">
  <h2>Asociar solución a ticket</h2>

  <form class="formulario" id="formAsociarSolucionTicket">
    <label for="rf39Ticket">Ticket</label>
    <select id="rf39Ticket" required>        
        <option value="INC-1566">INC-1566</option>
        <option value="INC-5678">INC-5678</option>
        <option value="INC-9012">INC-9012</option>
        <option value="INC-3456">INC-3456</option>
        <option value="INC-7890">INC-7890</option>
        <option value="INC-2345">INC-2345</option>
        <option value="INC-6789">INC-6789</option>
        <option value="INC-0123">INC-0123</option>
        <option value="INC-4567">INC-4567</option>
    </select>

    <label for="AsociarSolucionTicketSolucion">Solución asociada</label>
    <textarea id="AsociarSolucionTicketSolucion" rows="4" minlength="10" required></textarea>

    <button class="boton-principal" type="submit">Asociar solución</button>
  </form>
</section>
